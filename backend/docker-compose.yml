version: "3.9"

services:
  api:
    build: .
    container_name: resume_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - redis

  worker:
    build: .
    container_name: resume_worker
    command: celery -A app.celery_app.celery worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: resume_redis
    ports:
      - "6379:6379"